services:
  jarvis-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-api
    env_file:
      - .env.docker
    environment:
      JARVIS_API_HOST: 0.0.0.0
      JARVIS_API_PORT: 8080
      JARVIS_RESEARCH_HIERARCHICAL_RAG_ENABLED: "true"
      JARVIS_RESEARCH_NEO4J_ENABLED: "true"
      JARVIS_RESEARCH_NEO4J_URI: bolt://neo4j:7687
      JARVIS_RESEARCH_NEO4J_USERNAME: neo4j
      JARVIS_RESEARCH_NEO4J_PASSWORD: local-neo4j-password
      JARVIS_RESEARCH_NEO4J_DATABASE: neo4j
      JARVIS_RESEARCH_LANGGRAPH_ENABLED: "true"
      JARVIS_RESEARCH_VECTOR_STORE: chroma
      JARVIS_RESEARCH_CHROMA_PATH: /runtime/research/chroma
      JARVIS_RESEARCH_CHROMA_COLLECTION: jarvis_rag_nodes
      JARVIS_RESEARCH_STATE_PATH: /runtime/research/state.json
      JARVIS_MEMORY_BACKEND: sqlite
      JARVIS_MEMORY_SQLITE_PATH: /runtime/session_memory/jarvis_memory.db
      JARVIS_INFRA_MESSAGE_BUS_BACKEND: redis
      JARVIS_MEMORY_REDIS_URL: redis://redis:6379/0
      JARVIS_INFRA_REDIS_URL: redis://redis:6379/1
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      prometheus:
        condition: service_started
    volumes:
      - ${JARVIS_RUNTIME_ROOT:-/Volumes/Jiten-2026/AI_SSD/ai-research/runtime}:/runtime
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26
    container_name: jarvis-neo4j
    environment:
      NEO4J_AUTH: neo4j/local-neo4j-password
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1024m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ${JARVIS_RUNTIME_ROOT:-/Volumes/Jiten-2026/AI_SSD/ai-research/runtime}/neo4j/data:/data
      - ${JARVIS_RUNTIME_ROOT:-/Volumes/Jiten-2026/AI_SSD/ai-research/runtime}/neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p local-neo4j-password 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: jarvis-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: jarvis-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
