services:
  jarvis-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-api
    env_file:
      - .env.docker
    environment:
      JARVIS_API_HOST: 0.0.0.0
      JARVIS_API_PORT: 8080
      JARVIS_RESEARCH_HIERARCHICAL_RAG_ENABLED: "true"
      JARVIS_RESEARCH_NEO4J_ENABLED: "true"
      JARVIS_RESEARCH_NEO4J_URI: bolt://neo4j:7687
      JARVIS_RESEARCH_NEO4J_USERNAME: neo4j
      JARVIS_RESEARCH_NEO4J_PASSWORD: local-neo4j-password
      JARVIS_RESEARCH_NEO4J_DATABASE: neo4j
      JARVIS_RESEARCH_LANGGRAPH_ENABLED: "true"
      JARVIS_RESEARCH_LANGGRAPH_MAX_WAVE_SIZE: "0"
      JARVIS_AGENT_WORKFLOW_LANE_CAPS: '{"developer_lane":2,"analyst_lane":2,"manager_lane":1,"verifier_lane":1}'
      JARVIS_AGENT_WORKFLOW_LANE_PRIORITY: '{"verifier_lane":10,"manager_lane":20,"analyst_lane":30,"developer_lane":40}'
      JARVIS_AGENT_WORKFLOW_STEP_MAX_RETRIES: "1"
      JARVIS_AGENT_WORKFLOW_STEP_RESULT_CONTRACT_STRICT: "true"
      JARVIS_AGENT_TASK_PAYLOAD_CONTRACT_STRICT: "true"
      JARVIS_AGENT_WORKFLOW_CHECKPOINT_BACKEND: "sqlite"
      JARVIS_AGENT_WORKFLOW_CHECKPOINT_PATH: /runtime/workflow_checkpoints.json
      JARVIS_POLICY_COST_ENABLED: "true"
      JARVIS_POLICY_COST_LEDGER_PATH: /runtime/policy_cost_ledger.json
      JARVIS_ADAPTIVE_STRATEGY_ENABLED: "true"
      JARVIS_POOL_CPU_SLOTS: "6"
      JARVIS_POOL_GPU_SLOTS: "1"
      JARVIS_POOL_GPU_ENABLED: "true"
      JARVIS_RESEARCH_VECTOR_STORE: chroma
      JARVIS_RESEARCH_CHROMA_PATH: /runtime/research/chroma
      JARVIS_RESEARCH_CHROMA_COLLECTION: jarvis_rag_nodes
      JARVIS_RESEARCH_STATE_PATH: /runtime/research/state.json
      JARVIS_MEMORY_BACKEND: sqlite
      JARVIS_MEMORY_SQLITE_PATH: /runtime/session_memory/jarvis_memory.db
      JARVIS_INFRA_MESSAGE_BUS_BACKEND: redis
      JARVIS_MEMORY_REDIS_URL: redis://redis:6379/0
      JARVIS_INFRA_REDIS_URL: redis://redis:6379/1
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      prometheus:
        condition: service_started
    volumes:
      - ${JARVIS_RUNTIME_ROOT:-/Volumes/Jiten-2026/AI_SSD/ai-research/runtime}:/runtime
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26
    container_name: jarvis-neo4j
    environment:
      NEO4J_AUTH: neo4j/local-neo4j-password
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1024m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ${JARVIS_RUNTIME_ROOT:-/Volumes/Jiten-2026/AI_SSD/ai-research/runtime}/neo4j/data:/data
      - ${JARVIS_RUNTIME_ROOT:-/Volumes/Jiten-2026/AI_SSD/ai-research/runtime}/neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p local-neo4j-password 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: jarvis-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus-alerts.yml:/etc/prometheus/rules/jarvis-alerts.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: jarvis-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  jarvis-mcp-linkedin:
    image: mcr.microsoft.com/playwright/python:v1.53.0-jammy
    container_name: jarvis-mcp-linkedin
    profiles: ["mcp-multi"]
    working_dir: /workspace
    command:
      - python
      - scripts/linkedin_mcp_server.py
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --storage-state
      - ${LINKEDIN_STORAGE_STATE_PATH:-/workspace/data/linkedin_storage_state.json}
    volumes:
      - ./:/workspace:ro
    ports:
      - "8765:8765"
    restart: unless-stopped

  jarvis-mcp-github:
    image: python:3.11-slim
    container_name: jarvis-mcp-github
    profiles: ["mcp-multi"]
    working_dir: /workspace
    command:
      - python
      - scripts/github_mcp_server.py
      - --host
      - 0.0.0.0
      - --port
      - "8766"
      - --token
      - ${GITHUB_TOKEN:-}
    volumes:
      - ./:/workspace:ro
    ports:
      - "8766:8766"
    restart: unless-stopped

  jarvis-mcp-google:
    image: python:3.11-slim
    container_name: jarvis-mcp-google
    profiles: ["mcp-multi"]
    working_dir: /workspace
    command:
      - python
      - scripts/google_search_mcp_server.py
      - --host
      - 0.0.0.0
      - --port
      - "8767"
      - --google-api-key
      - ${GOOGLE_API_KEY:-}
      - --google-cse-id
      - ${GOOGLE_CSE_ID:-}
    volumes:
      - ./:/workspace:ro
    ports:
      - "8767:8767"
    restart: unless-stopped

  jarvis-mcp-worker:
    image: mcr.microsoft.com/playwright/python:v1.53.0-jammy
    container_name: jarvis-mcp-worker
    profiles: ["mcp-single"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - |
        python scripts/linkedin_mcp_server.py --host 0.0.0.0 --port 8765 --storage-state "${LINKEDIN_STORAGE_STATE_PATH:-/workspace/data/linkedin_storage_state.json}" &
        python scripts/github_mcp_server.py --host 0.0.0.0 --port 8766 --token "${GITHUB_TOKEN:-}" &
        python scripts/google_search_mcp_server.py --host 0.0.0.0 --port 8767 --google-api-key "${GOOGLE_API_KEY:-}" --google-cse-id "${GOOGLE_CSE_ID:-}" &
        wait
    volumes:
      - ./:/workspace:ro
    ports:
      - "8765:8765"
      - "8766:8766"
      - "8767:8767"
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
