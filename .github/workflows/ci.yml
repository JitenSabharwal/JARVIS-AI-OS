name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall -q core infrastructure interfaces skills tests

      - name: Unit tests
        run: |
          pytest tests/unit -q

      - name: Critical smoke gates
        run: |
          pytest tests/integration/test_api_interface.py::test_api_smoke_flow -q
          pytest tests/integration/test_api_interface.py::test_api_policy_gated_high_risk_smoke -q

      - name: Integration tests
        run: |
          pytest tests/integration -q

      - name: Repo response quality gate
        run: |
          python scripts/eval_repo_quality.py \
            --cases config/evals/repo_quality_cases.json \
            --responses-file config/evals/repo_quality_sample_responses.json \
            --min-pass-rate 0.95 \
            --min-case-score 0.70 \
            --out runtime/evals/repo_quality_ci_report.json

      - name: General response quality gate
        run: |
          python scripts/eval_response_quality.py \
            --cases config/evals/response_quality_cases.json \
            --responses-file config/evals/response_quality_sample_responses.json \
            --min-pass-rate 0.95 \
            --min-case-score 0.70 \
            --out runtime/evals/response_quality_ci_report.json

      - name: Operational drill (dry-run)
        run: |
          python scripts/ops_incident_drill.py

      - name: Strategy eval (synthetic)
        run: |
          python scripts/simulate_load.py --tasks 300 --out runtime/evals/load_trace_ci.json
          python scripts/eval_scheduling_strategy.py --trace runtime/evals/load_trace_ci.json --out runtime/evals/strategy_eval_ci_report.json
